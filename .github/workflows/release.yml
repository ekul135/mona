name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update manifest version
        run: |
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"
          jq --arg v "$version" '.version = $v' custom_components/mona/manifest.json > tmp.json
          mv tmp.json custom_components/mona/manifest.json

      - name: Create release zip
        run: |
          cd custom_components/mona
          zip -r ../../mona.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: mona.zip

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/mona/manifest.json
          git diff --staged --quiet || git commit -m "Bump version to ${{ github.event.release.tag_name }}"
          git push origin main || true
